<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#DC2626" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font: 14px "Helvetica", "Arial", sans-serif; }
      .th { font: 500 14px "Helvetica", "Arial", sans-serif; }
      .ts { font: 12px "Helvetica", "Arial", sans-serif; }
    </style>
  </defs>

  <rect x="20" y="20" width="640" height="460" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"/>

  <text class="th" x="260" y="50" text-anchor="middle" fill="#0D1B2A">Accoppiamento cono MUA - struttura fresata</text>
  <text class="ts" x="260" y="65" text-anchor="middle" fill="#64748B">vista in sezione</text>

  <line x1="270" y1="78" x2="270" y2="478" stroke="#94A3B8" stroke-width="0.6" stroke-dasharray="4 4"/>

  <!-- Struttura fresata: due path con foro per testa vite + canale stelo + cavita conica (apex y=232) -->
  <path d="M 285,100 L 430,100 L 430,290 L 345,290 L 293,232 L 275,232 L 275,115 L 285,115 Z"
        fill="#0052A3" fill-opacity="0.16" stroke="#0052A3" stroke-width="1.2"/>
  <path d="M 110,100 L 255,100 L 255,115 L 265,115 L 265,232 L 247,232 L 195,290 L 110,290 Z"
        fill="#0052A3" fill-opacity="0.16" stroke="#0052A3" stroke-width="1.2"/>

  <!-- Vite passante: testa incassata + stelo + punta nel MUA -->
  <rect x="257" y="100" width="26" height="15" fill="#475569"/>
  <rect x="265" y="115" width="10" height="117" fill="#64748B"/>

  <text class="ts" x="125" y="180" fill="#0052A3" font-weight="500">Struttura fresata</text>

  <!-- Spalla MUA: proporzionata, sporge poco oltre il cono -->
  <rect x="160" y="290" width="220" height="22" fill="#F97316" fill-opacity="0.9" stroke="#9A3412" stroke-width="0.6"/>

  <!-- Cono maschio MUA: leggermente piu alto (altezza 58, base 130, vertice 40) -->
  <path d="M 205,290 L 250,232 L 290,232 L 335,290 Z"
        fill="#F97316" fill-opacity="0.85" stroke="#9A3412" stroke-width="0.8"/>

  <!-- Foro centrale del MUA -->
  <rect x="261" y="232" width="18" height="20" fill="#FFFFFF" stroke="#9A3412" stroke-width="0.6"/>

  <!-- Punta vite avvitata nel MUA -->
  <rect x="265" y="232" width="10" height="20" fill="#64748B"/>

  <!-- Sezione esagonale interfaccia MUA-impianto -->
  <rect x="230" y="312" width="80" height="14" fill="#F97316" fill-opacity="0.85" stroke="#9A3412" stroke-width="0.6"/>

  <!-- Corpo impianto: largo quanto il cono MUA (130) -->
  <path d="M 205,326 L 335,326 L 335,452 L 312,478 L 228,478 L 205,452 Z"
        fill="#F97316" fill-opacity="0.85" stroke="#9A3412" stroke-width="0.8"/>

  <!-- Filettature impianto -->
  <line x1="205" y1="340" x2="335" y2="340" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="354" x2="335" y2="354" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="368" x2="335" y2="368" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="382" x2="335" y2="382" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="396" x2="335" y2="396" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="410" x2="335" y2="410" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="424" x2="335" y2="424" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="205" y1="438" x2="335" y2="438" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="210" y1="452" x2="330" y2="452" stroke="#9A3412" stroke-width="0.6"/>
  <line x1="222" y1="465" x2="318" y2="465" stroke="#9A3412" stroke-width="0.6"/>

  <text class="ts" x="350" y="305" fill="#9A3412" font-weight="500">MUA</text>
  <text class="ts" x="350" y="395" fill="#9A3412" font-weight="500">Impianto</text>

  <!-- Frecce gioco XY rosse a meta altezza cono -->
  <line x1="200" y1="261" x2="218" y2="261" stroke="#DC2626" stroke-width="1.6" marker-end="url(#ar)" marker-start="url(#ar)"/>
  <line x1="322" y1="261" x2="340" y2="261" stroke="#DC2626" stroke-width="1.6" marker-end="url(#ar)" marker-start="url(#ar)"/>

  <!-- Highlight Z verde sulla spalla -->
  <rect x="160" y="287" width="220" height="3" fill="#16A34A" opacity="0.9"/>

  <!-- Annotazione Scarico cono -->
  <line x1="340" y1="261" x2="505" y2="152" stroke="#DC2626" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="340" cy="261" r="2.2" fill="#DC2626"/>
  <rect x="505" y="130" width="140" height="44" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="0.6"/>
  <text class="th" x="515" y="148" fill="#991B1B">Scarico cono</text>
  <text class="ts" x="515" y="164" fill="#7F1D1D">Gioco XY ammesso</text>

  <!-- Annotazione Stop Z -->
  <line x1="380" y1="295" x2="505" y2="262" stroke="#15803D" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="380" cy="295" r="2.2" fill="#15803D"/>
  <rect x="505" y="240" width="140" height="44" rx="6" fill="#F0FDF4" stroke="#15803D" stroke-width="0.6"/>
  <text class="th" x="515" y="258" fill="#14532D">Stop Z</text>
  <text class="ts" x="515" y="274" fill="#166534">Vincolo geometrico</text>

  <!-- Annotazione Asse comune -->
  <line x1="270" y1="80" x2="505" y2="55" stroke="#475569" stroke-width="0.5" stroke-dasharray="3 3"/>
  <circle cx="270" cy="80" r="2.2" fill="#475569"/>
  <rect x="505" y="35" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="0.6"/>
  <text class="th" x="515" y="53" fill="#1E293B">Asse comune</text>
  <text class="ts" x="515" y="69" fill="#334155">Vincolo angolare</text>

  <!-- Box Diagnostica -->
  <rect x="505" y="320" width="140" height="115" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.6"/>
  <text class="th" x="515" y="340" fill="#0D1B2A">Diagnostica</text>
  <line x1="515" y1="349" x2="635" y2="349" stroke="#E2E8F0" stroke-width="0.5"/>
  <circle cx="520" cy="367" r="3.2" fill="#DC2626"/>
  <text class="ts" x="532" y="370" fill="#475569">XY: tolleranza</text>
  <circle cx="520" cy="389" r="3.2" fill="#15803D"/>
  <text class="ts" x="532" y="392" fill="#475569">Z: errore reale</text>
  <circle cx="520" cy="411" r="3.2" fill="#475569"/>
  <text class="ts" x="532" y="414" fill="#475569">Angolo: errore reale</text>
</svg>
