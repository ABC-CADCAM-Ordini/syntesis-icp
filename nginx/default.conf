server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve frontend statico
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API verso backend Railway
    location /api/ {
        proxy_pass https://backend-production-a015.up.railway.app;
        proxy_set_header Host backend-production-a015.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /auth/ {
        proxy_pass https://backend-production-a015.up.railway.app;
        proxy_set_header Host backend-production-a015.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
