server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tuodominio.it www.tuodominio.it;

    # Certificati Let's Encrypt (generati da Certbot su Railway o VPS)
    # Su Railway i certificati sono gestiti automaticamente — rimuovi queste righe
    # ssl_certificate     /etc/letsencrypt/live/tuodominio.it/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tuodominio.it/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy — adatta se usi CDN
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.tuodominio.it";

    # Frontend statico
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy verso backend FastAPI
    location /api/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # File STL possono essere grandi
        client_max_body_size 55M;
        proxy_read_timeout   120s;
    }

    location /auth/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
    }

    # Blocca file sensibili
    location ~ /\. { deny all; }
    location ~ \.(py|env|sh|log)$ { deny all; }
}
