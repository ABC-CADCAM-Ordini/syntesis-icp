<!doctype html>
<html><head><meta charset="utf-8"><title>Gate F6a — harness fres</title>
<style>body{font-family:monospace;padding:16px}.ok{color:#0a7a2f;font-weight:bold}.fail{color:#c21807;font-weight:bold}pre{background:#f5f5f5;padding:10px;overflow:auto;max-height:60vh}</style>
</head><body>
<h2>Gate F6a — wf/fresabilita.js: esposizione + funzioni pure</h2>
<div id="verdict">in esecuzione…</div>
<pre id="detail"></pre>

<!-- stub minimi: le fn REFERENZIANO queste globali solo a call-time; qui bastano per le pure -->
<script>
  // stub THREE minimale (le fn pure non lo usano; le fn overlay non le eseguiamo)
  window.THREE = { Vector3: function(x,y,z){this.x=x||0;this.y=y||0;this.z=z||0;} };
  // stato lasciato nel monolite: nell'harness lo forniamo noi (come farebbe il MAIN)
  var FRES_PROXIMITY_DEG = 2.0;
  var fresState = { arrowsByGid:{}, axesByGid:{}, mode:'mean' };
</script>

<!-- IL FILE REALE, caricato come nell'app (classic script) -->
<script src="/backend/static/wf/fresabilita.js"></script>

<script>
(function(){
  var NAMES = ["fresLoadDB","fresDefaultDB","fresSaveDB","fresAngleAxesDeg","fresClassify",
    "fresComputeMeanAxis","fresSphericalToVec","fresVecToSpherical","fresMaxDivergence",
    "fresComputeMinimaxAxis","fresInitOverlayScene","fresOverlayRender","fresBuildArrow",
    "fresClearAllArrows","fresBuildAllArrows","fresUpdateArrow","fresUpdateAllArrows","fresRecompute",
    "renderFresGroupSingle","fresRebuildMachineSelect","fresOnMachineChange","fresOnModeChange",
    "fresAddCustom","fresRemoveCustom","fresUpdateOpenButton","openFresability","closeFresability",
    "fresScreenToSphere","fresIsClickOnPicker","fresOnMouseDown","fresOnMouseMove","fresOnMouseUp",
    "fresAttachMouseHandlers","fresDetachMouseHandlers"];
  var problems = [], notes = [];

  // 1) esposizione: tutte e 34 raggiungibili come window.* (bare global via <script src>)
  var missing = NAMES.filter(function(n){ return typeof window[n] !== "function"; });
  if(missing.length) problems.push("NON esposte: " + missing.join(", "));
  notes.push("esposte " + (NAMES.length - missing.length) + "/" + NAMES.length);

  // 2) funzioni PURE eseguite (niente THREE/DOM): devono girare e dare tipi coerenti.
  //    fresAngleAxesDeg(a,b) vuole vettori {x,y,z} (verificato dal sorgente reale).
  var num = function(x){ return typeof x === "number" && !isNaN(x); };
  try {
    var Z = {x:0,y:0,z:1}, X = {x:1,y:0,z:0};
    var d = fresAngleAxesDeg(Z, Z); // stessi assi -> ~0 gradi
    if(!num(d) || d > 0.001) problems.push("fresAngleAxesDeg(z,z) atteso ~0, avuto " + d);
    else notes.push("fresAngleAxesDeg(z,z)=" + d.toFixed(4));
    var d2 = fresAngleAxesDeg(Z, X); // ortogonali -> 90
    if(!num(d2) || Math.abs(d2 - 90) > 0.001) problems.push("fresAngleAxesDeg ortogonali atteso 90, avuto " + d2);
    else notes.push("fresAngleAxesDeg ortog=" + d2.toFixed(2));
  } catch(e){ problems.push("fresAngleAxesDeg ha lanciato: " + e.message); }

  try {
    var cls = fresClassify(5, 30);   // 5° con limite 30° -> classe "buona"
    var cls2 = fresClassify(35, 30); // 35° oltre 30° -> classe critica
    if(typeof cls !== "string" && typeof cls !== "object") notes.push("fresClassify ritorna " + typeof cls);
    notes.push("fresClassify(5,30)=" + JSON.stringify(cls) + " ; (35,30)=" + JSON.stringify(cls2));
    if(JSON.stringify(cls) === JSON.stringify(cls2)) problems.push("fresClassify non distingue 5° da 35° su limite 30°");
  } catch(e){ problems.push("fresClassify ha lanciato: " + e.message); }

  try {
    var vec = fresSphericalToVec(0, 0);              // polo -> (0,0,1)
    var back = fresVecToSpherical(vec);              // ritorna array [theta, phi]
    if(!vec || Math.abs(vec.z - 1) > 1e-9) problems.push("fresSphericalToVec(0,0).z atteso 1, avuto " + (vec && vec.z));
    if(!Array.isArray(back) || !num(back[0]) || Math.abs(back[0]) > 1e-9)
      problems.push("fresVecToSpherical roundtrip theta atteso ~0, avuto " + JSON.stringify(back));
    else notes.push("fresSphericalToVec/VecToSpherical roundtrip theta=" + back[0].toFixed(4));
  } catch(e){ problems.push("fresSphericalToVec/VecToSpherical ha lanciato: " + e.message); }

  var v = document.getElementById("verdict");
  if(problems.length === 0){
    v.className = "ok"; v.textContent = "VERDE — 34/34 esposte, funzioni pure eseguono correttamente";
  } else {
    v.className = "fail"; v.textContent = "ROSSO — " + problems.length + " problemi";
  }
  document.getElementById("detail").textContent =
    (problems.length ? "PROBLEMI:\n- " + problems.join("\n- ") + "\n\n" : "") + "NOTE:\n- " + notes.join("\n- ");
  window.__FRES_GATE = { ok: problems.length === 0, problems: problems, notes: notes };
})();
</script>
</body></html>
